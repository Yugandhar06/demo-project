<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | FinancePro</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand"><span>Finance</span>Pro</div>
        <nav class="nav">
          <a href="/dashboard">Dashboard</a>
          <a href="/transactions">Transactions</a>
          <a href="/insights">Insights</a>
          <a class="active" href="/users">Users</a>
          <a href="/audit-log">Audit Trail</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-chip">
            <strong data-user-name>Loading...</strong>
            <span data-user-role>admin</span>
          </div>
          <button data-logout class="btn secondary">Logout</button>
        </div>
      </aside>

      <main class="content">
        <header class="page-header">
          <div>
            <h1>User Management</h1>
            <p class="subtitle">Create users, assign roles, and control account status.</p>
          </div>
        </header>

        <div id="users-message" class="message"></div>

        <section class="panel stack">
          <form id="user-form" class="form-grid">
            <input type="hidden" name="userId" />
            <input type="text" name="name" placeholder="Full name" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password (leave blank when editing)" />
            <select name="role" required>
              <option value="viewer">Viewer</option>
              <option value="analyst">Analyst</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit" class="btn">Save User</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-table"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/users.js"></script>
  </body>
</html>
